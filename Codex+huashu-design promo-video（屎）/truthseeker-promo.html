<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TruthSeeker 45s Promo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: #0b1018;
      --text: #f7f8ed;
      --muted: rgba(247, 248, 237, 0.68);
      --green: #d4ff12;
      --cyan: #67e8f9;
      --red: #ff5a5f;
      --line: rgba(212, 255, 18, 0.32);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 30%, #111827 0, var(--bg) 54%, #020305 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
      overflow: hidden;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #020305;
    }
    #stage {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      background: #05070a;
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.65);
    }
    .controls {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 18px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(5, 7, 10, .74);
      backdrop-filter: blur(14px);
      color: rgba(255,255,255,.82);
      font: 12px ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .controls button {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: white;
      padding: 7px 12px;
      cursor: pointer;
      font: inherit;
    }
    .controls input { flex: 1; }
    .hint {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 21;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(5, 7, 10, .72);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.68);
      font-size: 12px;
      letter-spacing: .08em;
    }
    body.recording .controls,
    body.recording .hint { display: none; }
  </style>
</head>
<body>
  <div class="hint">点击播放会启用音频。按 R 尝试浏览器录制 WebM；URL 加 ?record=1 自动录制。</div>
  <div id="wrap">
    <canvas id="stage" width="1920" height="1080"></canvas>
  </div>
  <div class="controls">
    <button id="play">播放 / 暂停</button>
    <button id="restart">重播</button>
    <button id="record">录制 WebM</button>
    <span id="time">0.00 / 45.00</span>
    <input id="scrub" type="range" min="0" max="45" step="0.01" value="0" />
    <a id="download" style="color:#d4ff12; display:none" download="truthseeker-promo.webm">下载视频</a>
  </div>
  <script>
    const DURATION = 45;
    const W = 1920;
    const H = 1080;
    const ASSET = (name) => `assets/${name}`;
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const playBtn = document.getElementById("play");
    const restartBtn = document.getElementById("restart");
    const recordBtn = document.getElementById("record");
    const timeEl = document.getElementById("time");
    const scrub = document.getElementById("scrub");
    const download = document.getElementById("download");

    const images = {};
    const imageList = {
      logo: "logo-dark-web.png",
      mark: "logo-mark-web.png",
      home: "home-web.png",
      upload: "upload-web.png",
      console: "console-web.png",
      collaboration: "collaboration-web.png",
      graph: "graph-web.png",
      cases: "cases-web.png",
      experience: "experience-web.png",
      dashboard: "dashboard-web.png",
    };

    let time = 0;
    let playing = false;
    let last = null;
    let audioStarted = false;
    let audioCtx = null;
    let audioDest = null;
    let audioStartWall = 0;
    let audioOffset = 0;
    let recorder = null;
    let recordedChunks = [];
    let stopAtEnd = false;

    const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
    const mix = (a, b, t) => a + (b - a) * t;
    const easeOut = (t) => 1 - Math.pow(1 - clamp(t), 3);
    const expoOut = (t) => t >= 1 ? 1 : 1 - Math.pow(2, -10 * clamp(t));
    const easeInOut = (t) => {
      t = clamp(t);
      return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    };
    const local = (t, a, b) => clamp((t - a) / (b - a));
    const fade = (t, a, b, c, d) => Math.min(local(t, a, b), 1 - local(t, c, d));

    function resize() {
      const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
      canvas.style.transform = `scale(${scale})`;
    }
    window.addEventListener("resize", resize);

    function loadImages() {
      return Promise.all(Object.entries(imageList).map(([key, file]) => new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => { images[key] = img; resolve(); };
        img.onerror = reject;
        img.src = ASSET(file);
      })));
    }

    function bg() {
      const g = ctx.createRadialGradient(960, 270, 20, 960, 420, 1120);
      g.addColorStop(0, "#15202d");
      g.addColorStop(.44, "#0b1018");
      g.addColorStop(1, "#030407");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.globalAlpha = .22;
      ctx.strokeStyle = "rgba(103,232,249,.16)";
      ctx.lineWidth = 1;
      for (let x = -100; x < W + 200; x += 90) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x - 260, H);
        ctx.stroke();
      }
      ctx.restore();
    }

    function text(str, x, y, size, color = "#f7f8ed", weight = 700, align = "left", alpha = 1, font = "Microsoft YaHei") {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.font = `${weight} ${size}px "${font}", "PingFang SC", system-ui, sans-serif`;
      ctx.textAlign = align;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(str, x, y);
      ctx.restore();
    }

    function pill(label, x, y, color, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = "700 25px Microsoft YaHei, system-ui";
      const w = ctx.measureText(label).width + 42;
      roundRect(x, y, w, 50, 25, `rgba(255,255,255,.06)`, color, 1.5);
      ctx.fillStyle = color;
      ctx.fillText(label, x + 21, y + 33);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r, fill, stroke, lw = 1) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
    }

    function drawImageCard(key, x, y, w, label, alpha = 1, tilt = 0, glow = "#67e8f9") {
      const img = images[key];
      if (!img) return;
      const h = w * img.height / img.width;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x + w / 2, y + h / 2);
      ctx.rotate(tilt);
      ctx.shadowColor = glow;
      ctx.shadowBlur = 32 * alpha;
      roundRect(-w / 2 - 12, -h / 2 - 58, w + 24, h + 80, 26, "rgba(8,13,20,.88)", "rgba(255,255,255,.16)", 1.5);
      ctx.shadowBlur = 0;
      text(label, -w / 2 + 16, -h / 2 - 19, 24, "#d4ff12", 800, "left", 1);
      ctx.clip();
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.restore();
    }

    function flowLine(points, alpha = 1, color = "rgba(212,255,18,.54)", width = 4) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
      ctx.stroke();
      ctx.restore();
    }

    function subtitle(t) {
      const lines = [
        [0.4, 6.8, "文本、图像、音频、视频、URL 正在被组合成复合攻击。"],
        [7.2, 14.4, "TruthSeeker 不是另一个检测按钮，而是一条可信研判链。"],
        [15.0, 24.0, "电子取证、情报溯源、逻辑质询与综合裁决，逐轮交叉验证。"],
        [24.8, 31.8, "当自动研判停滞，专家意见进入主推理链路。"],
        [32.2, 39.6, "证据图谱、审计日志、报告哈希和案例沉淀，形成可复核闭环。"],
        [40.0, 45.0, "让每一次判断，都能追溯到证据。"],
      ];
      const item = lines.find(([a, b]) => t >= a && t < b);
      if (!item) return;
      const [a, b, s] = item;
      const op = fade(t, a, a + .4, b - .45, b);
      ctx.save();
      ctx.globalAlpha = op;
      roundRect(350, 952, 1220, 70, 35, "rgba(0,0,0,.44)", "rgba(255,255,255,.10)");
      text(s, 960, 997, 34, "#f7f8ed", 700, "center", 1);
      ctx.restore();
    }

    function sceneThreat(t) {
      const op = fade(t, 0, .4, 6.4, 7.1);
      ctx.save();
      ctx.globalAlpha = op;
      const chips = [
        ["TEXT", 250, 260, "#67e8f9"], ["IMAGE", 1470, 210, "#d4ff12"],
        ["AUDIO", 310, 670, "#f7f8ed"], ["VIDEO", 1340, 725, "#67e8f9"],
        ["URL", 950, 180, "#ff5a5f"], ["METADATA", 830, 815, "#d4ff12"],
      ];
      chips.forEach(([s, x, y, c], i) => {
        const p = expoOut(local(t, .2 + i * .18, 2.4 + i * .18));
        const dx = (i % 2 ? 1 : -1) * (1 - p) * 240;
        pill(s, x + dx, y, c, .9);
      });
      const scan = mix(-220, 2140, local(t, 1.2, 5.9));
      ctx.fillStyle = "rgba(255,90,95,.12)";
      ctx.fillRect(scan - 24, 0, 48, H);
      ctx.strokeStyle = "rgba(255,90,95,.82)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(scan, 110);
      ctx.lineTo(scan - 130, 970);
      ctx.stroke();
      text("恶意 AIGC", 960, 454, 108, "#f7f8ed", 900, "center", expoOut(local(t, .8, 2.0)));
      text("不再是单点伪造", 960, 555, 78, "#d4ff12", 900, "center", expoOut(local(t, 1.3, 2.5)));
      text("跨模态 · 可扩散 · 难复核", 960, 640, 33, "rgba(247,248,237,.72)", 700, "center", expoOut(local(t, 2.0, 3.2)));
      ctx.restore();
    }

    function sceneSystem(t) {
      const op = fade(t, 6.7, 7.4, 14.0, 14.8);
      if (op <= 0) return;
      ctx.save();
      ctx.globalAlpha = op;
      const p = expoOut(local(t, 7.0, 8.8));
      drawImageCard("home", mix(170, 250, p), mix(280, 190, p), 860, "系统主页面", op, -0.035, "#d4ff12");
      drawImageCard("upload", mix(920, 850, p), mix(520, 390, p), 700, "检材上传", op * .95, 0.035, "#67e8f9");
      ctx.drawImage(images.logo, 92, 72, 112, 112);
      text("TruthSeeker", 220, 126, 48, "#f7f8ed", 900, "left", 1);
      text("跨模态恶意 AIGC 鉴伪与溯源系统", 222, 168, 24, "rgba(247,248,237,.66)", 600, "left", 1);
      text("从「检测结果」升级为「可信研判链路」", 960, 832, 56, "#f7f8ed", 900, "center", expoOut(local(t, 9.2, 10.4)));
      ctx.restore();
    }

    function sceneAgents(t) {
      const op = fade(t, 14.1, 14.9, 24.0, 24.8);
      if (op <= 0) return;
      ctx.save();
      ctx.globalAlpha = op;
      drawImageCard("console", 345, 128, 1230, "检测控制台", op, 0, "#d4ff12");
      const nodes = [
        ["电子取证", 300, "#67e8f9", 15.0],
        ["Challenger", 640, "#d4ff12", 16.4],
        ["情报溯源", 980, "#67e8f9", 18.1],
        ["Commander", 1320, "#f7f8ed", 20.0],
      ];
      nodes.forEach(([label, x, color, start], i) => {
        const p = expoOut(local(t, start, start + .8));
        ctx.save();
        ctx.globalAlpha *= p;
        roundRect(x, 835, 270, 72, 36, "rgba(5,7,10,.84)", color, 2.2);
        text(label, x + 135, 881, 30, color, 900, "center", 1);
        if (i < nodes.length - 1) flowLine([[x + 272, 871], [x + 340, 871]], p, "rgba(212,255,18,.58)", 4);
        ctx.restore();
      });
      const pulse = .5 + .5 * Math.sin(t * 7);
      text("0.8 质量门槛", 960, 760, 34, "#d4ff12", 900, "center", clamp(local(t, 17.0, 18.0) * (1 - local(t, 23.0, 24.0))));
      text("前 4 轮打回，第 5 轮记录残留风险", 960, 805, 24, `rgba(247,248,237,${.55 + .3 * pulse})`, 700, "center", clamp(local(t, 18.0, 19.0) * (1 - local(t, 23.0, 24.0))));
      ctx.restore();
    }

    function sceneHuman(t) {
      const op = fade(t, 24.1, 24.8, 31.7, 32.3);
      if (op <= 0) return;
      ctx.save();
      ctx.globalAlpha = op;
      drawImageCard("collaboration", 150, 172, 610, "人机协同面板", op, -0.025, "#d4ff12");
      roundRect(900, 225, 720, 405, 38, "rgba(8,13,20,.86)", "rgba(103,232,249,.28)", 2);
      text("Commander 主持", 950, 298, 34, "#67e8f9", 900);
      text("用户决策 · 专家协助 · 摘要回流", 950, 348, 34, "#f7f8ed", 800);
      const notes = [
        ["证据不足：补充来源链路", 960, 430],
        ["专家意见：保留残留风险", 1030, 512],
        ["用户确认：恢复研判", 930, 594],
      ];
      notes.forEach(([s, x, y], i) => {
        const p = expoOut(local(t, 25.2 + i * .7, 26.2 + i * .7));
        ctx.save();
        ctx.globalAlpha *= p;
        roundRect(x + (1 - p) * 80, y, 440, 56, 18, "rgba(212,255,18,.10)", "rgba(212,255,18,.35)", 1.2);
        text(s, x + 24 + (1 - p) * 80, y + 37, 25, "#f7f8ed", 700);
        ctx.restore();
      });
      flowLine([[770, 502], [900, 502], [900, 816], [1320, 816]], clamp(local(t, 27.6, 29.2)), "rgba(212,255,18,.66)", 5);
      text("人工经验不是事后批注", 1270, 760, 48, "#f7f8ed", 900, "center", expoOut(local(t, 28.2, 29.2)));
      text("而是可追踪、可复用的结构化证据", 1270, 822, 32, "#d4ff12", 800, "center", expoOut(local(t, 28.7, 29.7)));
      ctx.restore();
    }

    function sceneEvidence(t) {
      const op = fade(t, 31.7, 32.4, 39.4, 40.1);
      if (op <= 0) return;
      ctx.save();
      ctx.globalAlpha = op;
      const p = expoOut(local(t, 32.0, 34.0));
      drawImageCard("graph", mix(110, 170, p), 125, 720, "溯源图谱", op, -0.03, "#67e8f9");
      drawImageCard("cases", 1035, 126, 590, "公开案例库", op * .95, 0.025, "#d4ff12");
      drawImageCard("experience", 160, 620, 560, "个人经验库", op * .92, 0.018, "#d4ff12");
      drawImageCard("dashboard", 1040, 610, 590, "数据大屏", op * .92, -0.018, "#67e8f9");
      roundRect(755, 414, 410, 250, 34, "rgba(5,7,10,.92)", "rgba(212,255,18,.55)", 2.2);
      text("可信报告", 960, 482, 52, "#f7f8ed", 900, "center", expoOut(local(t, 34.2, 35.2)));
      text("Markdown / PDF", 960, 535, 28, "#67e8f9", 800, "center", expoOut(local(t, 34.8, 35.8)));
      text("Audit Log / report_hash", 960, 584, 28, "#d4ff12", 800, "center", expoOut(local(t, 35.2, 36.2)));
      text("91.9% F1 · 166.6s 平均处理耗时", 960, 733, 34, "rgba(247,248,237,.76)", 800, "center", expoOut(local(t, 36.3, 37.4)), "Consolas");
      ctx.restore();
    }

    function sceneFinal(t) {
      const op = clamp(local(t, 39.4, 40.3));
      if (op <= 0) return;
      ctx.save();
      ctx.globalAlpha = op;
      const p = expoOut(local(t, 39.8, 42.0));
      const s = mix(.2, 1, p);
      const y = mix(420, 300, p);
      for (let i = 0; i < 9; i++) {
        const a = i / 9 * Math.PI * 2 + t * .2;
        const r = mix(520, 190, p);
        flowLine([[960 + Math.cos(a) * r, 520 + Math.sin(a) * r * .48], [960, 505]], .18 * (1 - p) + .08, i % 2 ? "rgba(103,232,249,.42)" : "rgba(212,255,18,.42)", 3);
      }
      ctx.save();
      ctx.translate(960, y);
      ctx.scale(s, s);
      ctx.drawImage(images.logo, -130, -130, 260, 260);
      ctx.restore();
      text("TruthSeeker", 960, 554, 88, "#f7f8ed", 900, "center", expoOut(local(t, 41.2, 42.0)));
      text("基于多智能体协同的跨模态恶意 AIGC 鉴伪与溯源系统", 960, 620, 33, "rgba(247,248,237,.72)", 700, "center", expoOut(local(t, 41.6, 42.5)));
      text("让每一次判断，都能追溯到证据。", 960, 730, 54, "#d4ff12", 900, "center", expoOut(local(t, 42.3, 43.2)));
      ctx.restore();
    }

    function render(t) {
      bg();
      sceneThreat(t);
      sceneSystem(t);
      sceneAgents(t);
      sceneHuman(t);
      sceneEvidence(t);
      sceneFinal(t);
      subtitle(t);
    }

    function tick(now) {
      if (last == null) last = now;
      const dt = (now - last) / 1000;
      last = now;
      if (playing) {
        time += dt;
        if (time >= DURATION) {
          time = DURATION;
          playing = false;
          if (stopAtEnd && recorder && recorder.state === "recording") setTimeout(() => recorder.stop(), 350);
        }
      }
      render(time);
      timeEl.textContent = `${time.toFixed(2)} / ${DURATION.toFixed(2)}`;
      scrub.value = String(time);
      requestAnimationFrame(tick);
    }

    function startAudio() {
      if (audioStarted) return;
      audioStarted = true;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioStartWall = audioCtx.currentTime;
      audioOffset = time;

      const master = audioCtx.createGain();
      master.gain.value = .18;
      master.connect(audioCtx.destination);
      audioDest = audioCtx.createMediaStreamDestination();
      master.connect(audioDest);

      function osc(type, freq, start, dur, gain, detune = 0) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.value = freq;
        o.detune.value = detune;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(gain, start + .04);
        g.gain.exponentialRampToValueAtTime(.0001, start + dur);
        o.connect(g).connect(master);
        o.start(start);
        o.stop(start + dur + .1);
      }

      const base = audioCtx.currentTime + .05;
      osc("sine", 55, base, DURATION, .15);
      osc("triangle", 110, base + 4, 36, .055);
      [1.2, 2.0, 3.1, 6.7, 8.1, 14.7, 16.4, 18.1, 20.0, 24.6, 27.0, 32.0, 34.2, 39.8, 42.0].forEach((s, i) => {
        osc(i % 3 === 0 ? "square" : "sine", i % 2 ? 880 : 1320, base + s, .22, i % 4 === 0 ? .13 : .08, i * 17);
      });
      [7.0, 14.5, 24.5, 32.0, 40.0].forEach((s) => osc("sawtooth", 180, base + s, .55, .08));
      osc("sine", 42, base + 42.0, 1.6, .26);
    }

    function play() {
      startAudio();
      playing = !playing;
      last = null;
    }

    function restart() {
      time = 0;
      playing = true;
      last = null;
      startAudio();
    }

    async function startRecording() {
      if (!canvas.captureStream || !window.MediaRecorder) {
        alert("当前浏览器不支持 canvas.captureStream / MediaRecorder，无法直接录制。");
        return;
      }
      download.style.display = "none";
      recordedChunks = [];
      if (audioCtx && audioCtx.state !== "closed") {
        try { await audioCtx.close(); } catch (error) {}
      }
      audioStarted = false;
      audioCtx = null;
      audioDest = null;
      stopAtEnd = true;
      time = 0;
      playing = false;
      last = null;
      render(time);
      startAudio();

      const stream = canvas.captureStream(60);
      if (audioDest) {
        audioDest.stream.getAudioTracks().forEach((track) => stream.addTrack(track));
      }
      let mime = "video/webm;codecs=vp9";
      if (!MediaRecorder.isTypeSupported(mime)) mime = "video/webm;codecs=vp8";
      if (!MediaRecorder.isTypeSupported(mime)) mime = "video/webm";
      recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 12000000 });
      recorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) recordedChunks.push(event.data);
      };
      recorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        download.href = url;
        download.style.display = "inline";
        document.body.classList.remove("recording");
      };
      document.body.classList.add("recording");
      playing = true;
      last = null;
      recorder.start();
    }

    playBtn.addEventListener("click", play);
    restartBtn.addEventListener("click", restart);
    recordBtn.addEventListener("click", startRecording);
    scrub.addEventListener("input", (e) => { time = Number(e.target.value); playing = false; render(time); });
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); play(); }
      if (e.key.toLowerCase() === "r") startRecording();
    });

    loadImages().then(() => {
      resize();
      const q = new URLSearchParams(location.search);
      if (q.has("t")) time = Number(q.get("t")) || 0;
      if (q.get("clean") === "1") document.body.classList.add("recording");
      render(time);
      requestAnimationFrame(tick);
      window.__truthseekerReady = true;
      if (q.get("record") === "1") setTimeout(startRecording, 500);
    });
  </script>
</body>
</html>
